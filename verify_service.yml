---
- name: Verify capture service
  hosts: all
  gather_facts: no
  tasks:
    - ansible.windows.win_shell: |
        $s = Get-Service -Name capture -ErrorAction SilentlyContinue
        if ($s) { Write-Host ("SVC: " + $s.Status) } else { Write-Host "SVC: missing" }
        $p = Get-Process -Name capture -ErrorAction SilentlyContinue
        if ($p) { Write-Host ("PROC: " + $p.Id + " " + $p.StartTime) } else { Write-Host "PROC: none" }
        $n = netstat -ano | Select-String ":59232"
        if ($n) { Write-Host "PORT: yes" } else { Write-Host "PORT: no" }
        $r = netsh advfirewall firewall show rule name="Capture-Port-59232" | Select-String "Enabled"
        if ($r) { Write-Host "FW: enabled" } else { Write-Host "FW: no or disabled" }
        exit 0
      register: r
    - debug:
        var: r.stdout_lines
