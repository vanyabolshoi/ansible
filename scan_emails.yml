---
- name: Scan pharmacy computers for email accounts
  hosts: windows
  gather_facts: false
  vars:
    script_path: "C:\\ProgramData\\get_pharmacy_emails.ps1"
    output_dir: "C:\\BackupSQL\\_emails"

  tasks:
    - name: Ensure output directory exists on target
      ansible.windows.win_file:
        path: "{{ output_dir }}"
        state: directory

    - name: Copy email extraction script to target
      ansible.windows.win_copy:
        src: scripts/get_pharmacy_emails.ps1
        dest: "{{ script_path }}"

    - name: Run email extraction script
      ansible.windows.win_shell:
        cmd: "powershell -ExecutionPolicy Bypass -File \"{{ script_path }}\" -OutputDir \"{{ output_dir }}\""
      register: script_output

    - name: Show result summary
      debug:
        msg: "{{ inventory_hostname }} — {{ script_output.stdout_lines | last }}"
