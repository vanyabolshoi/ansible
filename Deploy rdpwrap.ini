- name: Deploy rdpwrap.ini
  hosts: windows
  gather_facts: no

  tasks:
    - name: Download rdpwrap.ini
      ansible.windows.win_get_url:
        url: https://raw.githubusercontent.com/vanyabolshoi/ansible/main/rdpwrap.ini
        dest: 'C:\Program Files\RDP Wrapper\rdpwrap.ini'
      become: yes
      become_method: runas
      become_user: Administrator
