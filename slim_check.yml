---
- name: Slim check
  hosts: all
  gather_facts: no
  tasks:
    - ansible.windows.win_shell: |
        if (Test-Path "C:\Program Files\Capture\capture.exe") { Write-Host "EXISTS: yes" } else { Write-Host "EXISTS: no" }
        $s = Get-Service -Name capture -ErrorAction SilentlyContinue
        if ($s) { Write-Host ("SVC: " + $s.Status) } else { Write-Host "SVC: missing" }
        $p = Get-Process -Name capture -ErrorAction SilentlyContinue
        if ($p) { Write-Host "PROC: yes" } else { Write-Host "PROC: no" }
        $n = netstat -ano | Select-String ":59232"
        if ($n) { Write-Host "PORT: yes" } else { Write-Host "PORT: no" }
      register: result
    - debug:
        var: result.stdout_lines
