---
- name: Verify agent on 5986
  hosts: all
  gather_facts: no
  tasks:
    - ansible.windows.win_shell: |
        try { $r = (New-Object System.Net.WebClient).DownloadString("http://localhost:5986/capture/health"); Write-Host ("health: " + $r) } catch { Write-Host "health: FAIL" }
        try { $r = (New-Object System.Net.WebClient).DownloadString("http://localhost:5986/capture/api/v1/metrics?secret=Until1987"); Write-Host ("metrics: " + $r.Substring(0, [Math]::Min(100, $r.Length))) } catch { Write-Host "metrics: FAIL" }
        $p = Get-WmiObject Win32_Process | Where-Object { $_.Name -eq "powershell.exe" -and $_.CommandLine -like "*capture_agent*" } | Measure-Object
        Write-Host ("workers: " + $p.Count)
        exit 0
      register: r
    - debug:
        var: r.stdout_lines
