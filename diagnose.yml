---
- name: Diagnose
  hosts: all
  gather_facts: no
  tasks:
    - ansible.windows.win_shell: |
        $os = Get-CimInstance Win32_OperatingSystem
        Write-Host ("OS: " + $os.Caption + " " + $os.Version)
        $f = Get-Item "C:\capture\capture.exe"
        Write-Host ("SIZE: " + $f.Length)
        $v = & "C:\capture\capture.exe" --version 2>&1
        if ($LASTEXITCODE -eq 0) { Write-Host ("VERSION: " + $v) } else { Write-Host ("VERSION ERR: " + $v) }
        $h = & "C:\capture\capture.exe" --help 2>&1 | Select-Object -First 5
        if ($LASTEXITCODE -eq 0) { Write-Host ("HELP: " + ($h -join "; ")) } else { Write-Host ("HELP ERR: " + ($h -join "; ")) }
        exit 0
      register: r
    - debug:
        var: r.stdout_lines
