---
- name: Test outbound from pharmacy to dashboard
  hosts: all
  gather_facts: no
  tasks:
    - ansible.windows.win_shell: |
        try {
          $r = (New-Object System.Net.WebClient).DownloadString("http://172.16.11.226:8080/api/disk_status")
          Write-Host ("OK: " + $r.Substring(0, [Math]::Min(100, $r.Length)))
        } catch { Write-Host ("ERR: " + $_.Exception.Message) }
        try {
          $r = (New-Object System.Net.WebClient).DownloadString("http://172.16.11.59/api/health")
          Write-Host ("CHECKMATE: " + $r.Substring(0, [Math]::Min(100, $r.Length)))
        } catch { Write-Host ("CHECKMATE_ERR: " + $_.Exception.Message) }
        exit 0
      register: r
    - debug:
        var: r.stdout_lines
