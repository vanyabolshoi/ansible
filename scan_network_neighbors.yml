---
- name: Scan pharmacy local network around server .5 IP
  hosts: windows
  gather_facts: false
  vars:
    database_hint: ''

  tasks:
    - name: Write network scan script to remote host
      ansible.windows.win_copy:
        dest: C:\Windows\Temp\scan_network_neighbors.ps1
        content: |
          $ErrorActionPreference = "Stop"

          function Get-PrimaryServerIp {
            $ips = @(Get-NetIPAddress -AddressFamily IPv4 -ErrorAction SilentlyContinue |
              Where-Object {
                $_.IPAddress -notlike '127.*' -and
                $_.IPAddress -notlike '169.254*' -and
                $_.IPAddress -notlike '0.*' -and
                $_.IPAddress -match '\.5$'
              } |
              Sort-Object InterfaceMetric, SkipAsSource |
              Select-Object -ExpandProperty IPAddress)
            if ($ips.Count -gt 0) { return [string]$ips[0] }
            return ""
          }

          function Get-DatabaseName {
            if ('{{ database_hint }}') { return '{{ database_hint }}' }
            try {
              $sqlService = Get-Service | Where-Object { $_.Name -like 'MSSQL$*' } | Select-Object -First 1
              if ($sqlService) {
                $sqlName = $sqlService.Name -replace 'MSSQL\$',''
                $instance = ".\\$sqlName"
                $dbInfo = sqlcmd -S "$instance" -h -1 -W -Q "
                SET NOCOUNT ON;
                SELECT TOP 1 DB_NAME(database_id)
                FROM sys.master_files
                WHERE type_desc = 'ROWS'
                  AND DB_NAME(database_id) NOT IN ('master','model','msdb','tempdb')
                  AND physical_name LIKE 'C:\DataSQL%'
                ORDER BY database_id;
                "
                $db = ($dbInfo | Where-Object { $_ -and $_.Trim() -ne '' } | Select-Object -First 1)
                if ($db) { return $db.Trim() }
              }
            } catch {}
            return "unknown_$env:COMPUTERNAME"
          }

          function Test-TcpPort([string]$Ip, [int]$Port, [int]$TimeoutMs = 700) {
            try {
              $client = New-Object System.Net.Sockets.TcpClient
              $iar = $client.BeginConnect($Ip, $Port, $null, $null)
              $ok = $iar.AsyncWaitHandle.WaitOne($TimeoutMs, $false) -and $client.Connected
              $client.Close()
              return $ok
            } catch {
              return $false
            }
          }

          function Test-ArpPresence([string]$Ip) {
            try {
              $nei = Get-NetNeighbor -IPAddress $Ip -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($nei -and $nei.LinkLayerAddress -and $nei.State -notin @('Unreachable','Incomplete')) {
                return $true
              }
            } catch {}
            try {
              $arp = arp -a $Ip 2>$null
              if ($arp -match [regex]::Escape($Ip) -and $arp -match '([0-9a-f]{2}-){5}[0-9a-f]{2}') {
                return $true
              }
            } catch {}
            return $false
          }

          function Test-NeighborIps([string]$Subnet, [int[]]$Suffixes, [int[]]$Ports) {
            $found = @()
            foreach ($suffix in $Suffixes) {
              $ip = "$Subnet$suffix"
              try {
                if (Test-Connection -ComputerName $ip -Count 1 -Quiet -TimeoutSeconds 1) {
                  $found += $ip
                  continue
                }
              } catch {}
              foreach ($port in ($Ports | Select-Object -Unique)) {
                if (Test-TcpPort -Ip $ip -Port $port) {
                  $found += $ip
                  break
                }
              }
              if ($found -contains $ip) {
                continue
              }
              try {
                Test-Connection -ComputerName $ip -Count 1 -Quiet -TimeoutSeconds 1 | Out-Null
              } catch {}
              if (Test-ArpPresence -Ip $ip) {
                $found += $ip
              }
            }
            return @($found | Select-Object -Unique)
          }

          $serverIp = Get-PrimaryServerIp
          if (-not $serverIp) {
            throw 'Server IP ending in .5 not found'
          }

          $parts = $serverIp.Split('.')
          if ($parts.Count -ne 4) {
            throw "Invalid server IP: $serverIp"
          }
          $subnet = "$($parts[0]).$($parts[1]).$($parts[2])."
          $database = Get-DatabaseName
          $cashIps = Test-NeighborIps -Subnet $subnet -Suffixes @(11,12,13,14,15,16) -Ports @(135,445,3389,5985,5986)

          # Discover service devices (21-29) and classify by ICMP ping:
          # responding → printer, silent → Maria
          $mariaIps = @(); $printerIps = @()
          foreach ($_sfx in @(21,22,23,24,25,26,27,28,29)) {
            $_ip = "$subnet$_sfx"
            $_found = $false; $_pingable = $false
            try { if (Test-Connection -ComputerName $_ip -Count 1 -Quiet -TimeoutSeconds 1) { $_pingable = $true; $_found = $true } } catch {}
            if (-not $_found) { foreach ($_pt in @(9100,9101,515,631,80,443,23)) { if (Test-TcpPort -Ip $_ip -Port $_pt) { $_found = $true; break } } }
            if (-not $_found) { if (Test-ArpPresence -Ip $_ip) { $_found = $true } }
            if ($_found) { if ($_pingable) { $printerIps += $_ip } else { $mariaIps += $_ip } }
          }

          $result = [ordered]@{
            time = (Get-Date).ToString('yyyy-MM-dd HH:mm:ss')
            database = $database
            computer = $env:COMPUTERNAME
            host = '{{ inventory_hostname }}'
            local_ip = $serverIp
            subnet = $subnet
            cash_ips = @($cashIps)
            maria_ips = @($mariaIps)
            printer_ips = @($printerIps)
            cash_count = @($cashIps).Count
            maria_count = @($mariaIps).Count
            printer_count = @($printerIps).Count
            status = 'OK'
          }

          $json = $result | ConvertTo-Json -Depth 5 -Compress
          Write-Output $json

    - name: Run network scan script
      ansible.windows.win_shell: |
        powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:\Windows\Temp\scan_network_neighbors.ps1
      register: script_output

    - name: Show network scan result
      debug:
        var: script_output.stdout_lines
