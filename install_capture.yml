---
- name: Install Capture Agent
  hosts: all
  gather_facts: no
  vars:
    secret: "Until1987"
    port: 59232
    dir: "C:\Program Files\Capture"
  tasks:
    - name: Install capture via PowerShell
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $dir = "{{ dir }}"
        $port = {{ port }}
        $secret = "{{ secret }}"
        $zipUrl = "https://github.com/bluewave-labs/capture/releases/download/v1.4.0/capture_1.4.0_windows_amd64.zip"
        $zipPath = "$dir\capture.zip"
        $exePath = "$dir\capture.exe"

        New-Item -ItemType Directory -Force -Path $dir | Out-Null

        # Stop and remove existing service
        if (Get-Service -Name capture -ErrorAction SilentlyContinue) {
          Stop-Service -Name capture -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          sc.exe delete capture
          Start-Sleep -Seconds 2
        }

        # Download
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "Downloading capture..."
        Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -TimeoutSec 120 -UseBasicParsing

        # Extract
        Write-Host "Extracting..."
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $dir)
        Remove-Item $zipPath -Force

        # Create service
        Write-Host "Creating service..."
        $binPath = "`"$exePath`" serve --port $port --secret $secret"
        New-Service -Name capture -BinaryPathName $binPath -DisplayName "Capture Agent" -StartupType Automatic

        # Start service
        Write-Host "Starting service..."
        Start-Service -Name capture -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 3

        # Firewall
        New-NetFirewallRule -DisplayName "Capture-Port-$port" -Direction Inbound -Protocol TCP -LocalPort $port -Action Allow -ErrorAction SilentlyContinue

        # Verify
        $svc = Get-Service -Name capture -ErrorAction SilentlyContinue
        Write-Host "Service state: $($svc.Status)"

        try {
          $r = Invoke-WebRequest -Uri "http://localhost:$port/api/v1/metrics" -TimeoutSec 5 -UseBasicParsing
          Write-Host "API: OK ($($r.StatusCode))"
        } catch {
          Write-Host "API: FAIL ($_)"
        }
      register: result

    - name: Show result
      debug:
        var: result.stdout_lines
