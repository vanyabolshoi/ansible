---
- name: Install Capture Agent
  hosts: all
  gather_facts: no
  tasks:
    - name: Clean old service
      ansible.windows.win_shell: |
        $s = Get-Service -Name capture -ErrorAction SilentlyContinue
        if ($s) { sc.exe stop capture 2>$null; Start-Sleep 2; sc.exe delete capture 2>$null; Start-Sleep 2 }
        exit 0

    - name: Clean old files
      ansible.windows.win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - C:\capture
        - C:\Program Files\Capture

    - name: Create dir
      ansible.windows.win_file:
        path: C:\capture
        state: directory

    - name: Copy zip
      ansible.windows.win_copy:
        src: capture_1.4.0_windows_amd64.zip
        dest: C:\capture\capture.zip

    - name: Extract zip
      ansible.windows.win_shell: |
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory("C:\capture\capture.zip", "C:\capture")
        Remove-Item "C:\capture\capture.zip" -Force
        exit 0

    - name: Create service
      ansible.windows.win_shell: |
        $exe = "C:\capture\capture.exe"
        if (-not (Test-Path $exe)) { throw "capture.exe not found" }
        New-Service -Name capture -BinaryPathName $exe -DisplayName "Capture Monitoring Agent" -Description "Capture hardware monitoring agent" -StartupType Automatic
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\capture" -Name "Environment" -Value @("API_SECRET=Until1987", "PORT=59232", "GIN_MODE=release") -Type MultiString
        Write-Host "service created"
        exit 0

    - name: Add firewall rule
      ansible.windows.win_shell: |
        netsh advfirewall firewall add rule name="Capture-Port-59232" dir=in action=allow protocol=TCP localport=59232
        exit 0

    - name: Start service
      ansible.windows.win_shell: |
        Start-Service -Name capture
        Start-Sleep 5
        $s = Get-Service -Name capture
        Write-Host ("status: " + $s.Status)
        $p = Get-Process -Name capture -ErrorAction SilentlyContinue
        if ($p) { Write-Host ("pid: " + $p.Id) } else { Write-Host "pid: none" }
        $n = netstat -ano | Select-String ":59232"
        if ($n) { Write-Host "port: yes" } else { Write-Host "port: no" }
        exit 0
