---
- name: Install Capture Agent
  hosts: all
  gather_facts: no
  tasks:
    - name: Clean old
      ansible.windows.win_shell: |
        $s = Get-Service -Name capture -ErrorAction SilentlyContinue
        if ($s) { sc.exe stop capture 2>$null; Start-Sleep 2; sc.exe delete capture 2>$null; Start-Sleep 2 }
        Remove-Item "C:\capture" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item "C:\Program Files\Capture" -Recurse -Force -ErrorAction SilentlyContinue
        exit 0

    - name: Create dir
      ansible.windows.win_file:
        path: C:\capture
        state: directory

    - name: Copy zip
      ansible.windows.win_copy:
        src: capture_1.4.0_windows_amd64.zip
        dest: C:\capture\capture.zip

    - name: Extract zip
      ansible.windows.win_shell: |
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory("C:\capture\capture.zip", "C:\capture")
        Remove-Item "C:\capture\capture.zip" -Force
        exit 0

    - name: Write wrapper
      ansible.windows.win_shell: |
        @"
        @echo off
        set API_SECRET=Until1987
        set PORT=59232
        set GIN_MODE=release
        C:\capture\capture.exe
        "@ | Set-Content -Path "C:\capture\run.cmd" -Encoding ASCII
        exit 0

    - name: Create service with wrapper
      ansible.windows.win_shell: |
        New-Service -Name capture -BinaryPathName "cmd.exe" -ArgumentList "/c C:\capture\run.cmd" -DisplayName "Capture Agent" -StartupType Automatic
        exit 0

    - name: Firewall rule
      ansible.windows.win_shell: |
        netsh advfirewall firewall add rule name="Capture-Port-59232" dir=in action=allow protocol=TCP localport=59232
        exit 0

    - name: Start service
      ansible.windows.win_shell: |
        Start-Service -Name capture
        Start-Sleep 5
        $s = Get-Service -Name capture
        Write-Host ("service: " + $s.Status)
        $p = Get-Process -Name capture -ErrorAction SilentlyContinue
        if ($p) { Write-Host ("proc: " + $p.Id) } else {
          $p2 = Get-Process -Name cmd -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -like "*capture*" }
          if ($p2) { Write-Host ("cmd: " + $p2.Id) } else { Write-Host "proc: none" }
        }
        $n = netstat -ano | Select-String ":59232"
        if ($n) { Write-Host "port: yes" } else { Write-Host "port: no" }
        exit 0
