---
- name: Install Capture Agent on pharmacy servers
  hosts: all
  gather_facts: no
  vars:
    capture_secret: "Until1987"
    capture_port: 59232
    capture_dir: "C:\\Program Files\\Capture"
    release_url: "https://github.com/bluewave-labs/capture/releases/download/v1.4.0"
    zip_name: "capture_1.4.0_windows_amd64.zip"

  tasks:
    - name: Check if capture is already installed
      ansible.windows.win_stat:
        path: "{{ capture_dir }}\\capture.exe"
      register: capture_bin

    - name: Download and install capture agent
      ansible.windows.win_shell: |
        $dir = "{{ capture_dir }}"
        $zipUrl = "{{ release_url }}/{{ zip_name }}"
        $zipPath = "$dir\capture.zip"
        $port = {{ capture_port }}
        $secret = "{{ capture_secret }}"

        # Create directory
        New-Item -ItemType Directory -Force -Path $dir | Out-Null

        # Download
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "Downloading from $zipUrl..."
        try {
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -TimeoutSec 120
        } catch {
          Write-Warning "Download failed: $_"
          exit 1
        }

        # Extract
        Write-Host "Extracting..."
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $dir)

        # Remove old service
        sc.exe delete capture 2>$null

        # Create service
        $binPath = "`"$dir\capture.exe`" serve --port $port --secret $secret"
        New-Service -Name "capture" -BinaryPathName $binPath -DisplayName "Capture Agent" -StartupType Automatic

        # Start
        Start-Service -Name capture

        # Firewall
        New-NetFirewallRule -DisplayName "Capture Agent Port $port" -Direction Inbound -Protocol TCP -LocalPort $port -Action Allow -ErrorAction SilentlyContinue

        Write-Host "Capture Agent installed successfully"
      when: not capture_bin.stat.exists
      register: install_result

    - name: Verify capture service
      ansible.windows.win_service:
        name: capture
        start_mode: auto
        state: started
      ignore_errors: yes
      register: svc

    - name: Check API health
      ansible.windows.win_uri:
        url: "http://localhost:{{ capture_port }}/api/v1/metrics"
        method: GET
        status_code: 200
      register: health
      retries: 10
      delay: 3
      until: health.status == 200
      ignore_errors: yes

    - name: Final status
      debug:
        msg:
          - "{{ 'INSTALLED' if (not capture_bin.stat.exists) else 'ALREADY_INSTALLED' }}"
          - "Service state: {{ svc.state | default('unknown') }}"
          - "API health: {{ 'OK' if health.status == 200 else 'FAIL' }}"
