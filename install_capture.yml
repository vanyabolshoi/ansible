---
- name: Install Capture Agent
  hosts: all
  gather_facts: no
  tasks:
    - name: Copy capture zip from controller
      ansible.windows.win_copy:
        src: capture_1.4.0_windows_amd64.zip
        dest: C:\Windows\Temp\capture.zip
      register: copied

    - name: Install capture from local zip
      ansible.windows.win_shell: |
        $dir = "C:\Program Files\Capture"
        $port = 59232
        $secret = "Until1987"
        New-Item -ItemType Directory -Force -Path $dir | Out-Null
        if (Get-Service -Name capture -ErrorAction SilentlyContinue) {
          Stop-Service -Name capture -Force -ErrorAction SilentlyContinue
          Start-Sleep 2; sc.exe delete capture; Start-Sleep 2
        }
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory("C:\Windows\Temp\capture.zip", $dir)
        sc.exe create capture binPath="`"$dir\capture.exe`" serve --port $port --secret $secret" start=auto DisplayName="Capture Agent"
        Start-Service -Name capture
        New-NetFirewallRule -DisplayName "Capture-Port-$port" -Direction Inbound -Protocol TCP -LocalPort $port -Action Allow -ErrorAction SilentlyContinue
        $svc = Get-Service -Name capture
        Write-Host "Service: $($svc.Status)"
        Remove-Item "C:\Windows\Temp\capture.zip" -Force -ErrorAction SilentlyContinue
      register: result

    - name: Show result
      debug:
        var: result.stdout_lines
