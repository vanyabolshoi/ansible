---
- name: Deploy Capture Agent on port 5986
  hosts: all
  gather_facts: no
  tasks:
    - name: Create directory
      ansible.windows.win_file:
        path: C:\capture
        state: directory

    - name: Copy agent script
      ansible.windows.win_copy:
        src: capture_agent.ps1
        dest: C:\capture\capture_agent.ps1

    - name: Remove old scheduled task
      ansible.windows.win_shell: |
        schtasks /end /tn "CaptureAgent" /f 2>$null | Out-Null
        Start-Sleep 2
        schtasks /delete /tn "CaptureAgent" /f 2>$null | Out-Null
        exit 0

    - name: Add URL ACL for http on port 5986
      ansible.windows.win_shell: |
        netsh http delete urlacl url=http://+:59232/ 2>$null | Out-Null
        netsh http delete urlacl url=http://+:5986/capture/ 2>$null | Out-Null
        netsh http add urlacl url=http://+:5986/capture/ user=Everyone 2>&1 | Out-Null
        Write-Host "urlacl ok"
        exit 0

    - name: Create scheduled task
      ansible.windows.win_shell: |
        $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -ExecutionPolicy Bypass -File C:\capture\capture_agent.ps1" -WorkingDirectory "C:\capture"
        $trigger = New-ScheduledTaskTrigger -AtStartup
        $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -Priority 7
        $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
        Register-ScheduledTask -TaskName "CaptureAgent" -Action $action -Trigger $trigger -Settings $settings -Principal $principal -Force
        Write-Host "task created"
        exit 0

    - name: Start task
      ansible.windows.win_shell: |
        schtasks /run /tn "CaptureAgent"
        Start-Sleep 8
        $n = netstat -ano | Select-String "5986"
        if ($n) { Write-Host "port: yes" } else { Write-Host "port: no" }
        try { $r = (New-Object System.Net.WebClient).DownloadString("http://localhost:5986/capture/health"); Write-Host ("test: " + $r) } catch { Write-Host ("test: " + $_.Exception.Message) }
        exit 0
